<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --primary: #6366f1;
      --border: #e2e8f0;
      --text-secondary: #64748b;
      --error: #ef4444;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #114697 0%, #2791f5 100%);
      font-family: system-ui, -apple-system, sans-serif;
      display: grid;
      place-items: center;
    }

    .register-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.18);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
      position: relative;
    }

    label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 5px;
    }

    input, select {
      width: 90%;
      padding: 0.8rem 0rem 0.8rem 2.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #f9fafb;
    }

    .input-icon {
      position: absolute;
      left: 10px;
      top: 32px;
      color: var(--text-secondary);
    }

    button {
      width: 100%;
      padding: 0.9rem;
      background: #114697;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #2791f5;
    }

    .bottom-text {
      text-align: center;
      margin-top: 15px;
      font-size: 0.9rem;
    }

    .errorlist {
      color: var(--error);
      font-size: 0.8rem;
      list-style: none;
    }
  </style>
</head>

<body>

<div class="register-container">
  <h1>Create Account</h1>

  <form method="post">
    {% csrf_token %}

    <!-- Full Name -->
    <div class="form-group">
      <label>Full Name</label>
      <i class="fas fa-user input-icon"></i>
      {{ form.full_name }}
    </div>

    <!-- Email -->
    <div class="form-group">
      <label>Email</label>
      <i class="fas fa-envelope input-icon"></i>
      {{ form.email }}
    </div>

    <!-- Mobile -->
    <div class="form-group">
      <label>Mobile Number</label>
      <i class="fas fa-phone input-icon"></i>
      {{ form.mobile_number }}
    </div>

    <!-- Business -->
    <div class="form-group">
      <label>Business / Shop Name</label>
      <i class="fas fa-building input-icon"></i>
      {{ form.business_name }}
    </div>

    <!-- Project -->
    <div class="form-group">
      <label>Project</label>
      <i class="fas fa-diagram-project input-icon"></i>
      {{ form.project }}
    </div>

    <!-- Username -->
    <div class="form-group">
      <label>Username</label>
      <i class="fas fa-user input-icon"></i>
      {{ form.username }}
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>Password</label>
      <i class="fas fa-lock input-icon"></i>
      {{ form.password }}
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label>Confirm Password</label>
      <i class="fas fa-lock input-icon"></i>
      {{ form.confirm_password }}
    </div>

    <button type="submit">Register</button>
  </form>

  <div class="bottom-text">
    Already have an account? 
    <a href="/accounts/login/">Login</a>
  </div>
</div>

</body>
</html>
